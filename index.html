<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Bohr Atom Explorer - Premium Edition</title>
    <style>
        :root { 
            --neon-blue: #00d2ff; 
            --neon-purple: #9d00ff;
            --glass: rgba(15, 15, 35, 0.85);
            --accent: #ff0055;
        }
        
        body { margin: 0; background-color: #050510; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; color: white; }
        canvas { display: block; }

        /* Search Bar - Enhanced */
        #search-container {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; width: 90%; max-width: 550px;
        }
        #el-search {
            width: 100%; padding: 15px 25px; border-radius: 30px; border: 2px solid var(--neon-blue);
            font-size: 18px; outline: none; background: rgba(0, 0, 0, 0.6);
            color: white; backdrop-filter: blur(15px); 
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4), inset 0 0 10px rgba(0, 210, 255, 0.2);
            transition: 0.3s;
        }
        #el-search:focus { box-shadow: 0 0 30px var(--neon-blue); border-color: #fff; }

        /* Data Display - Large & Responsive */
        #data-display {
            position: absolute; background: var(--glass); padding: 25px; border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px); display: none; z-index: 90;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Desktop View */
        @media (min-width: 769px) {
            #data-display { top: 110px; right: 30px; width: 380px; max-height: 75vh; }
        }

        /* Mobile View - Large Bottom Sheet */
        @media (max-width: 768px) {
            #data-display { bottom: 0; left: 0; transform: none; width: 100%; border-radius: 30px 30px 0 0; max-height: 55vh; box-sizing: border-box; overflow-y: auto; }
            #el-search { font-size: 16px; padding: 12px 20px; }
        }

        .header-box { border-bottom: 2px solid var(--neon-blue); margin-bottom: 20px; padding-bottom: 10px; display: flex; align-items: center; gap: 20px; }
        h2 { color: var(--neon-blue); margin: 0; font-size: 26px; text-shadow: 0 0 10px var(--neon-blue); }
        .sym-large { font-size: 45px; font-weight: bold; background: linear-gradient(to bottom, #fff, var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .info-item { background: rgba(255,255,255,0.07); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .label { color: var(--neon-blue); display: block; font-size: 11px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px; }
        .val { font-size: 15px; font-weight: 500; }

        .shell-box { background: linear-gradient(90deg, rgba(0,210,255,0.2), transparent); padding: 10px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--neon-blue); }

        /* Developer Button & Modal */
        #dev-btn {
            position: absolute; bottom: 30px; right: 30px; z-index: 101;
            width: 60px; height: 60px; border-radius: 50%; background: var(--neon-purple);
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--neon-purple); transition: 0.3s;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(157, 0, 255, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(157, 0, 255, 0); } 100% { transform: scale(1); } }
        
        #dev-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            width: 300px; background: rgba(10, 10, 25, 0.98); border: 2px solid var(--neon-purple);
            border-radius: 25px; padding: 30px; z-index: 200; display: none; opacity: 0;
            transition: 0.3s; text-align: center; backdrop-filter: blur(20px);
        }
        #dev-modal.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .dev-link { display: block; padding: 12px; margin: 10px 0; border-radius: 10px; background: rgba(255,255,255,0.05); color: #fff; text-decoration: none; transition: 0.3s; font-size: 14px; }
        .dev-link:hover { background: var(--neon-purple); transform: translateX(5px); }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: var(--accent); }
    </style>
</head>
<body>

</div>

    <div class="header-box">

        <div class="info-item"><span class="label">ফুটনাঙ্ক</span><span class="val" id="m-boil">-</span></div>
    </div>
    
    <div style="font-size: 14px; color: #bbb; line-height: 1.6;">

    </div>
</div>

    // Three.js Core Setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
    camera.position.set(0, 20, 60);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Stars Background
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(6000 * 3);
    for(let i = 0; i < 6000 * 3; i++) { starPos[i] = (Math.random() - 0.5) * 1500; }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.7, color: 0xffffff })));

    let currentAtomGroup = new THREE.Group();
    scene.add(currentAtomGroup);

    function buildBohrModel(element) {
        while(currentAtomGroup.children.length > 0){ currentAtomGroup.remove(currentAtomGroup.children[0]); }
        
        // Nucleus (Glow Effect)
        const nuc = new THREE.Mesh(
            new THREE.SphereGeometry(2.5, 32, 32),
            new THREE.MeshPhongMaterial({ color: 0xff3300, emissive: 0xff1100, emissiveIntensity: 0.5 })
        );
        currentAtomGroup.add(nuc);

        // Standard shell configuration if not defined
        const shells = element.shells || calculateShells(element.num);
        let radius = 10;

        shells.forEach((count, i) => {
            // Ring
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(radius, 0.05, 16, 100),
                new THREE.MeshBasicMaterial({ color: 0x00d2ff, transparent: true, opacity: 0.3 })
            );
            ring.rotation.x = Math.PI / 2;
            currentAtomGroup.add(ring);

            // Electrons
            for (let j = 0; j < count; j++) {
                const electron = new THREE.Mesh(
                    new THREE.SphereGeometry(0.6, 16, 16),
                    new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0x00d2ff })
                );
                electron.userData = { angle: (j/count)*Math.PI*2, speed: 0.03 / (i + 1), radius: radius };
                currentAtomGroup.add(electron);
            }
            radius += 6;
        });
        updateUI(element, shells);
    }

    function calculateShells(n) {
        let res = [];
        let config = [2, 8, 18, 32, 32, 18, 8];
        for(let c of config) {
            if(n <= 0) break;
            let take = Math.min(n, c);
            res.push(take);
            n -= take;
        }
        return res;
    }

    function updateUI(data, shells) {
        const display = document.getElementById('data-display');
        display.style.display = 'block';
        document.getElementById('m-name').innerText = data.name;
        document.getElementById('m-sym').innerText = data.sym;
        document.getElementById('m-num').innerText = data.num;
        document.getElementById('m-mass').innerText = data.mass;
        document.getElementById('m-melt').innerText = data.melt;
        document.getElementById('m-boil').innerText = data.boil;
        document.getElementById('m-desc').innerText = data.desc;
        document.getElementById('m-shell-val').innerText = shells.join(" - ");
    }

    // Modal Toggle
    const devBtn = document.getElementById('dev-btn');
    const modal = document.getElementById('dev-modal');
    function toggleModal() { modal.classList.toggle('active'); }
    devBtn.onclick = toggleModal;

    // Search Logic
    document.getElementById('el-search').addEventListener('input', (e) => {
        const v = e.target.value.trim().toLowerCase();
        const res = elementDB.find(el => el.name.toLowerCase().includes(v) || el.sym.toLowerCase() === v || el.num.toString() === v);
        if (res) buildBohrModel(res);
    });

    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const light = new THREE.PointLight(0xffffff, 1.5);
    light.position.set(30, 30, 30);
    scene.add(light);

    function animate() {
        requestAnimationFrame(animate);
        currentAtomGroup.children.forEach(c => {
            if (c.userData.speed) {
                c.userData.angle += c.userData.speed;
                c.position.x = Math.cos(c.userData.angle) * c.userData.radius;
                c.position.z = Math.sin(c.userData.angle) * c.userData.radius;
            }
        });
        controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    buildBohrModel(elementDB[0]);
    animate();
</script>
</body>
</html>
